name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq python3 curl

      - name: Install fireclaude from local checkout
        run: npm install -g ./

      - name: Resolve and verify FC_BIN
        run: |
          # npm prefix -g gives the installation prefix (e.g. /usr/local).
          # npm places bin symlinks at <prefix>/bin — this is stable across npm versions.
          NPM_PREFIX="$(npm prefix -g)"
          FC_BIN="${NPM_PREFIX}/bin/fc"

          echo "--- PATH shadowing diagnostics ---"
          echo "which fc        : $(which fc 2>/dev/null || echo '(not in PATH)')"
          echo "type -a fc      : $(type -a fc 2>/dev/null || echo '(not found)')"
          echo "npm prefix -g   : ${NPM_PREFIX}"
          echo "FC_BIN          : ${FC_BIN}"
          ls -la "${FC_BIN}" || { echo "ERROR: FC_BIN not found at ${FC_BIN}"; exit 1; }
          # Confirm the symlink target is our Node shim, not fontconfig
          FC_REAL="$(readlink -f "${FC_BIN}")"
          echo "FC_BIN realpath : ${FC_REAL}"
          head -1 "${FC_REAL}" | grep -q node || { echo "ERROR: FC_BIN target does not look like a Node shim (head: $(head -1 "${FC_REAL}"))"; exit 1; }
          echo "FC_BIN=${FC_BIN}" >> "$GITHUB_ENV"

      - name: Bootstrap Firecrawl stack
        env:
          FIRECRAWL_INSTALL_DIR: /tmp/fc-ci
          PORT: 3099
          INTERNAL_PORT: 3002
          COMPOSE_PROJECT_NAME: firecrawl_ci
        run: |
          "$FC_BIN" setup --install-dir /tmp/fc-ci --model llama3.2:3b
        timeout-minutes: 20

      - name: Assert stack is healthy
        env:
          FIRECRAWL_URL: http://localhost:3099
          FIRECRAWL_INSTALL_DIR: /tmp/fc-ci
          COMPOSE_PROJECT_NAME: firecrawl_ci
        run: |
          STATUS_JSON=$("$FC_BIN" status --json 2>/dev/null || echo "[]")
          STATUS_LEN=$(echo "$STATUS_JSON" | jq 'length')
          echo "Stack services reported: ${STATUS_LEN}"
          echo "$STATUS_JSON" | jq .
          if [[ "${STATUS_LEN}" -lt 7 ]]; then
            echo "ERROR: stack came up with fewer than 7 services (got ${STATUS_LEN})."
            echo "Check the Bootstrap step logs above for install.sh failures."
            exit 1
          fi

      - name: Run skill tests
        env:
          FIRECRAWL_URL: http://localhost:3099
          FIRECRAWL_INSTALL_DIR: /tmp/fc-ci
          COMPOSE_PROJECT_NAME: firecrawl_ci
        run: |
          bash skills/fireclaude/tests/test_fc.sh
        timeout-minutes: 5

      - name: Tear down stack
        if: always()
        env:
          FIRECRAWL_INSTALL_DIR: /tmp/fc-ci
          COMPOSE_PROJECT_NAME: firecrawl_ci
        run: |
          "$FC_BIN" teardown --purge || bash uninstall.sh || true
