use_default_settings: true

server:
  secret_key: "firecrawl-selfhost-change-me"
  limiter: false
  image_proxy: false
  public_instance: false
  port: 8080
  bind_address: 0.0.0.0

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

ui:
  static_use_hash: true

redis:
  url: redis://redis:6379/1

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
